server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_SCHEMA_DEV}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: fryday-dev

jwt:
  secret-key: ${JWT_SECRET_KEY_DEV}

logging:
  file:
    name: /home/ubuntu/logs/dev/application.log
  logback:
    rollingpolicy:
      max-history: 7