spring:
  application:
    name: fryday-test

  datasource:
    url: jdbc:h2:mem:fryday_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: false
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      username: ""
      password: ""

jwt:
  secret-key: test-secret-key-for-testing-purposes-at-least-32-characters-long-enough
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000

oauth:
  apple:
    client-id: com.test.app
    jwks-url: https://appleid.apple.com/auth/keys

fcm:
  enabled: false
  credentials:
    json: ""

docs:
  security:
    username: test
    password: test

admin:
  api-key: test-admin-key
